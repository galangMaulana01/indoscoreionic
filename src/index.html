<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>IndoScore</title>
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            merah: "#FC0B12",
            kuning: "#F7CC0C",
            latar: "#121212",
            kartu: "#191919",
          }
        }
      }
    }
  </script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>
<body class="relative min-h-screen bg-black text-gray-200 overflow-x-hidden">

  <!-- VIDEO SPLASH SCREEN -->
  <div id="video-splash" class="video-splash">
    <video id="splash-video" autoplay playsinline>
      <source src="src/assets/splash.mp4" type="video/mp4">
    </video>
  </div>

  <!-- GLOBAL LOADING -->
  <div id="global-loading" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="flex flex-col items-center w-full max-w-[200px] px-2">
      <img src="src/assets/logo.png" class="w-44 mb-5 object-contain" alt="Logo">
      <div class="w-full h-[6px] bg-[#333] rounded-full overflow-hidden border border-gray-700/50">
        <div class="h-full bg-merah rounded-full animate-progress"></div>
      </div>
    </div>
  </div>

  <!-- BACKGROUND BLUR -->
  <div class="fixed inset-0 -z-10">
    <div class="absolute -top-40 -left-32 w-[500px] h-[400px] bg-merah/30 blur-[120px] rounded-full"></div>
    <div class="absolute -top-32 -right-24 w-[400px] h-[300px] bg-kuning/30 blur-[120px] rounded-full"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-black/40 to-black"></div>
  </div>

  <!-- VIEW: JADWAL (MATCHES) -->
  <div id="view-matches" class="block">
    <header class="sticky top-0 z-40 backdrop-blur-md bg-transparent pt-safe">
      <div class="max-w-2xl mx-auto mt-2">
        <img src="src/assets/logo.png" class="w-48 pl-3">
      </div>
    </header>
    <div id="benner" class="max-w-2xl mx-auto px-4 my-2"></div>
    <main class="max-w-2xl mx-auto px-4">
      <div id="matches-skeleton" class="space-y-5"></div>
      <div id="matches-container" class="space-y-5 hidden"></div>
      <div id="matches-empty" class="hidden text-center py-16 text-gray-500">
        <div class="text-5xl mb-3 opacity-30">⚽</div>
        <p class="font-medium">Tidak ada jadwal yang tersedia untuk liga ini.</p>
      </div>
    </main>
  </div>

  <!-- VIEW: DETAIL MATCH -->
  <div id="view-detail" class="hidden">
    <header class="bg-gradient-to-br from-merah/10 to-kuning/10 pt-safe pb-8 relative z-10">
      <div class="max-w-2xl mx-auto px-4 pt-4">
        <div class="flex items-center justify-between mb-6">
          <button onclick="goBackFromDetail()" class="p-2 -ml-2 bg-black/30 hover:bg-black/50 rounded-full transition active:scale-95">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
            </svg>
          </button>
          <span class="text-xs font-bold tracking-widest text-white/80 uppercase" id="league-name-header">Match Detail</span>
          <div class="w-9"></div>
        </div>
        <div id="scoreboard-skeleton" class="py-8">
          <div class="flex items-center justify-between px-2">
            <div class="flex flex-col items-center text-center w-[35%] gap-2">
              <div class="skeleton skeleton-circle w-12 h-12"></div>
              <div class="skeleton skeleton-text w-24"></div>
            </div>
            <div class="text-center w-[30%] flex flex-col items-center gap-2">
              <div class="skeleton skeleton-text w-16 h-8"></div>
              <div class="skeleton skeleton-text w-20 h-6 rounded-full"></div>
            </div>
            <div class="flex flex-col items-center text-center w-[35%] gap-2">
              <div class="skeleton skeleton-circle w-12 h-12"></div>
              <div class="skeleton skeleton-text w-24"></div>
            </div>
          </div>
        </div>
        <div id="scoreboard-container" class="hidden">
          <div class="flex items-center justify-between px-2">
            <div class="flex flex-col items-center text-center w-[35%]">
              <img id="home-logo" src="https://placehold.co/60" class="w-12 h-12 object-contain" alt="">
              <span id="home-name" class="text-[13px] font-bold text-white line-clamp-2 leading-snug">Tim Home</span>
            </div>
            <div class="text-center w-[30%] flex flex-col items-center">
              <div id="match-score" class="text-4xl font-black tracking-wider text-white drop-shadow-md mb-2">VS</div>
              <div id="match-status" class="text-[10px] font-bold text-merah bg-white px-3 py-1.5 rounded-full shadow-sm tracking-wide uppercase">STATUS</div>
            </div>
            <div class="flex flex-col items-center text-center w-[35%]">
              <img id="away-logo" src="https://placehold.co/60" class="w-12 h-12 object-contain" alt="">
              <span id="away-name" class="text-[13px] font-bold text-white line-clamp-2 leading-snug">Tim Away</span>
            </div>
          </div>
        </div>
      </div>
    </header>
    <nav class="sticky top-0 bg-kartu/95 backdrop-blur-md border-b border-gray-800 z-50 shadow-sm">
      <div class="max-w-2xl mx-auto px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar">
        <button onclick="switchDetailTab('overview')" id="btn-overview" class="tab-btn shrink-0 px-5 py-2 rounded-full text-xs font-bold bg-merah text-white transition-all">Overview</button>
        <button onclick="switchDetailTab('events')"  id="btn-events"  class="tab-btn shrink-0 px-5 py-2 rounded-full text-xs font-bold bg-gray-800 text-gray-300 hover:bg-gray-700 transition-all">Events</button>
        <button onclick="switchDetailTab('stats')"   id="btn-stats"   class="tab-btn shrink-0 px-5 py-2 rounded-full text-xs font-bold bg-gray-800 text-gray-300 hover:bg-gray-700 transition-all">Stats</button>
        <button onclick="switchDetailTab('lineup')"  id="btn-lineup"  class="tab-btn shrink-0 px-5 py-2 rounded-full text-xs font-bold bg-gray-800 text-gray-300 hover:bg-gray-700 transition-all">Line-up</button>
      </div>
    </nav>
    <main class="max-w-2xl mx-auto p-4 space-y-4">
      <section id="tab-overview" class="tab-content space-y-4"></section>
      <section id="tab-events"   class="tab-content hidden space-y-4"></section>
      <section id="tab-stats"    class="tab-content hidden space-y-5"></section>
      <section id="tab-lineup"   class="tab-content hidden space-y-4"></section>
    </main>
  </div>

  <!-- VIEW: KLASEMEN -->
  <div id="view-standings" class="hidden">
    <header class="sticky top-0 z-40 backdrop-blur-md bg-kartu/95 shadow-sm border-b border-gray-800 pt-safe">
      <div class="max-w-2xl mx-auto px-4 py-4 text-center">
        <h1 class="text-xl font-black text-white tracking-tight">KLASEMEN</h1>
      </div>
    </header>
    <main class="max-w-2xl mx-auto p-4 mt-2">
      <div id="standings-skeleton" class="space-y-4">
        <div class="skeleton h-8 w-full mb-2"></div>
        <div class="skeleton h-64 w-full"></div>
      </div>
      <div id="standings-container" class="hidden bg-kartu rounded shadow-sm border border-gray-800 overflow-hidden"></div>
      <div id="standings-empty" class="hidden text-center py-16 text-gray-500">
        <div class="text-5xl mb-3 opacity-30">📋</div>
        <p class="font-medium">Klasemen belum tersedia.</p>
      </div>
    </main>
  </div>

  <!-- VIEW: TIM / SQUAD -->
  <div id="view-team" class="hidden">
    <header class="sticky top-0 z-40 backdrop-blur-md bg-merah pt-safe pb-4 rounded-b-2xl shadow-lg">
      <div class="max-w-2xl mx-auto px-4">
        <div class="flex items-center gap-3 p-3">
          <button onclick="goBackFromTeam()" class="p-2 -ml-2 bg-black/20 rounded-full hover:bg-black/30 transition">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
          </button>
          <div class="flex items-center justify-center gap-3 flex-1" id="team-header"></div>
          <div class="w-9"></div>
        </div>
      </div>
    </header>
    <main class="max-w-2xl mx-auto p-4">
      <div id="squad-skeleton" class="space-y-4">
        <div class="skeleton h-12 w-full"></div>
        <div class="skeleton h-48 w-full"></div>
      </div>
      <div id="squad-container" class="hidden space-y-4"></div>
      <div id="squad-empty" class="hidden text-center py-12 text-gray-500">
        <div class="text-5xl mb-3 opacity-30">👕</div>
        <p class="font-medium">Belum ada data pemain untuk tim ini.</p>
      </div>
    </main>
  </div>

  <!-- BOTTOM NAV -->
  <nav id="bottom-nav" class="fixed bottom-0 left-0 w-full z-50 bg-kartu/95 backdrop-blur-md shadow-[0_-1px_10px_rgba(0,0,0,0.3)] pb-safe border-t border-gray-800">
    <div class="max-w-2xl mx-auto flex justify-center gap-2">
      <button onclick="switchMainView('matches')" id="nav-btn-matches" class="flex-1 py-3 flex flex-col items-center gap-1 text-merah transition-colors active:bg-gray-800">
        <svg width="24" height="24" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M24.5 11.842V20.9613C24.5 23.56 22.4107 25.6666 19.8333 25.6666H8.16667C5.58934 25.6666 3.5 23.56 3.5 20.9613V11.842C3.5 10.4292 4.12959 9.09123 5.21484 8.19759L11.0482 3.39422C12.766 1.97968 15.234 1.97968 16.9518 3.39422L22.7852 8.19759C23.8704 9.09123 24.5 10.4292 24.5 11.842ZM11.6667 20.125C11.1834 20.125 10.7917 20.5167 10.7917 21C10.7917 21.4832 11.1834 21.875 11.6667 21.875H16.3333C16.8166 21.875 17.2083 21.4832 17.2083 21C17.2083 20.5167 16.8166 20.125 16.3333 20.125H11.6667Z" fill="currentColor" />
        </svg>
        <span class="text-[11px] font-bold">Jadwal</span>
      </button>
      <button onclick="switchMainView('standings')" id="nav-btn-standings" class="flex-1 py-3 flex flex-col items-center gap-1 text-gray-500 transition-colors active:bg-gray-800">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 20H20M6 17L6 13M12 17L12 9M18 17L18 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          <rect x="4" y="3" width="4" height="4" rx="1" fill="currentColor" />
          <rect x="10" y="3" width="4" height="4" rx="1" fill="currentColor" />
          <rect x="16" y="3" width="4" height="4" rx="1" fill="currentColor" />
        </svg>
        <span class="text-[11px] font-bold">Klasemen</span>
      </button>
    </div>
  </nav>

  <!-- MODAL AUTH -->
  <div id="auth-modal-overlay" class="auth-modal-overlay fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
    <div class="auth-modal-content bg-[#1a1a1a] border border-gray-800 rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
      <div class="mb-4">
        <img src="src/assets/logo.png" class="w-14 mx-auto" alt="IndoScore">
      </div>
      <h2 class="text-lg font-black text-white mb-1">Selamat Datang di IndoScore</h2>
      <p class="text-xs text-gray-400 mb-6">Masuk untuk pengalaman yang lebih personal</p>
      <button id="btn-google-login" class="w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-100 text-gray-800 font-semibold py-3 px-4 rounded-xl transition mb-3 active:scale-95">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Masuk / Daftar dengan Google
      </button>
      <button id="btn-skip-auth" class="w-full py-2.5 px-4 text-gray-400 hover:text-white text-sm font-medium transition">Nanti Saja</button>
      <div id="auth-error" class="hidden mt-4 text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg p-2">
        <span id="auth-error-text"></span>
      </div>
    </div>
  </div>

  <script src="src/main.js"></script>
</body>
</html>
